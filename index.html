<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>SplashOS</title>

        <!-- Critical CSS — rendered before any JS loads -->
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body,
            #root {
                width: 100%;
                height: 100%;
                overflow-x: hidden;
                background: radial-gradient(
                    ellipse at center,
                    rgba(13, 8, 50, 0.85) 0%,
                    #000 100%
                );
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                -webkit-font-smoothing: antialiased;
                color: #fff;
            }
            .loader {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                z-index: 10;
            }
            .dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.6);
                animation: dot-bounce 1.2s ease-in-out infinite both;
            }
            .dot:nth-child(1) {
                animation-delay: 0s;
            }
            .dot:nth-child(2) {
                animation-delay: 0.2s;
            }
            .dot:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes dot-bounce {
                0%,
                60%,
                100% {
                    transform: translateY(0);
                    opacity: 0.3;
                }
                30% {
                    transform: translateY(-16px);
                    opacity: 1;
                }
            }
            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100%;
                opacity: 0;
            }
        </style>

        <meta
            name="description"
            content="SplashOS is a modern open-source operating system crafted for a seamless, elegant, and intuitive desktop experience."
        />

        <meta
            name="keywords"
            content="SplashOS, open source operating system, Linux desktop, desktop OS, modern OS"
        />

        <meta name="author" content="SplashOS" />
        <meta name="robots" content="index, follow" />
        <meta name="theme-color" content="#0e79f4" />
        <link rel="canonical" href="https://splashos.com" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://splashos.com" />
        <meta property="og:title" content="SplashOS" />

        <meta
            property="og:description"
            content="A thoughtfully crafted open-source operating system that brings simplicity, elegance, and freedom to your desktop."
        />

        <meta property="og:image" content="https://splashos.com/logo.svg" />
        <meta property="og:image:width" content="500" />
        <meta property="og:image:height" content="500" />
        <meta property="og:image:alt" content="SplashOS logo" />
        <meta property="og:site_name" content="SplashOS" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:url" content="https://splashos.com" />
        <meta name="twitter:title" content="SplashOS" />

        <meta
            name="twitter:description"
            content="A thoughtfully crafted open-source operating system that brings simplicity, elegance, and freedom to your desktop."
        />

        <meta name="twitter:image" content="https://splashos.com/logo.svg" />

        <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
